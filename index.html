<!DOCTYPE html>
<html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="styles.css">
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
      <title>JD's Business Card</title>
    </head>

    <body>
      <main>
        <article class="business-card" aria-label="JD's Business Card">

           <img src="#" alt="Picture of Jamie Dawson" width="500" height="500" class="avatar">

           <h1>Jamie Dawson</h1>

           <h2 class="role">Shopify Developer</h2>

           <hr>

           <div aria-label="Contact info and skills.">
            <p>Email <a href="#"> jamie@example.com </a></p>

            <p>Web <a href="#">jamiedawson.dev</a></p>

            <p>Based <span class="location">Portland, OR</span></p>

            <p class="skills">
              <span class="skill">Liquid</span>
              <span class="skill">Shopify</span>
              <span class="skill">CSS</span>
              <span class="skill">JavaScript</span>
              <span class="skill">UX</span>
            </p>

            <button type="button" id="cta">Hire Me &rarr;</button>
           </div>

        </article> 
      </main>
    </body>
</html>
